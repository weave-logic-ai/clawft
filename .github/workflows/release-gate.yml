name: Release Gate

on:
  workflow_run:
    workflows: ["Publish Crates", "Release (Docker)"]
    types: [completed]

permissions:
  contents: write

jobs:
  mark-failed:
    name: Mark release on downstream failure
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Extract tag from failed run
        id: tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Failed workflow: ${{ github.event.workflow_run.name }} on ${TAG}"

      - name: Mark release as failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          WORKFLOW="${{ github.event.workflow_run.name }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"

          # Check if a release exists for this tag
          if ! gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "No release found for ${TAG}, skipping"
            exit 0
          fi

          # Mark as prerelease so it's visually flagged
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --prerelease \
            --notes "$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq .body)

---
> **Release incomplete**: \`${WORKFLOW}\` failed. [View run](${RUN_URL})
> Re-run the failed workflow or create a new release to fix."
