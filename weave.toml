# WeftOS Configuration
# Generated for: project

[domain]
name = "project"
language = "rust"
description = "WeftOS-managed project"

[kernel]
max_processes = 64
health_check_interval_secs = 30

[tick]
interval_ms = 50
budget_ratio = 0.3
adaptive = true

[sources]
[sources.git]
path = "."
branch = "main"

[sources.files]
root = "."
patterns = ["**/*.rs"]

[embedding]
provider = "mock-sha256"
dimensions = 384
batch_size = 16

[governance]
default_environment = "development"
risk_threshold = 0.9

[mesh]
enabled = false
bind_address = "0.0.0.0:9470"
seed_peers = []
